<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo — Unary Lab</title>
  <link rel="icon" href="file/logo/unary-logo-black.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css?v=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>

<div id="nav-placeholder"></div>

<main>
  <div class="container">
    <div id="photo-root">
      <p style="color:#9ca3af;font-size:14px;padding:10px 0">Loading…</p>
    </div>
  </div>
</main>

<script src="js/utils.js?v=1"></script>
<script>
function dateToPrefix(str) {
  const d = parseNewsDate(str);
  if (!d) return null;
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}${m}${day}`;
}

function formatFullDate(str) {
  const d = parseNewsDate(str);
  if (!d) return '';
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function renderEventsTab(entries) {
  if (entries.length === 0)
    return '<p style="color:#9ca3af;font-size:14px;padding:10px 0">No photos yet.</p>';
  return `<ul class="photo-timeline">${entries.map(entry => {
    const dateDisplay = formatFullDate(entry.date);
    const images = entry.files.map(f =>
      `<img src="file/photo/${encodeURIComponent(entry.folder)}/${encodeURIComponent(f)}" alt="${esc(entry.title)}" loading="lazy">`
    ).join('');
    return `
      <li class="photo-entry">
        <div class="photo-entry-date">${dateDisplay}</div>
        <div class="photo-entry-caption">${esc(entry.title)}</div>
        ${images ? `<div class="photo-grid">${images}</div>` : ''}
      </li>`;
  }).join('')}</ul>`;
}

function renderHealingTab(petManifest) {
  if (petManifest.length === 0)
    return '<p style="color:#9ca3af;font-size:14px;padding:10px 0">No pets yet.</p>';
  return petManifest.map(entry => {
    const dashIdx = entry.folder.indexOf('-');
    const petName   = dashIdx >= 0 ? entry.folder.slice(0, dashIdx) : entry.folder;
    const ownerName = dashIdx >= 0 ? entry.folder.slice(dashIdx + 1) : '';
    const petDisplay = petName.charAt(0).toUpperCase() + petName.slice(1);
    const images = entry.files.map(f =>
      `<img src="file/pet/${encodeURIComponent(entry.folder)}/${encodeURIComponent(f)}" alt="${esc(petDisplay)}" loading="lazy">`
    ).join('');
    return `
      <div class="team-section">
        <div class="team-section-title">
          ${esc(petDisplay)}${ownerName ? ` <span style="font-weight:400;color:#888;">— ${esc(ownerName)}</span>` : ''}
        </div>
        <div class="photo-grid">${images}</div>
      </div>`;
  }).join('');
}

let eventsHtml = '', healingHtml = '';

function showTab(tab) {
  document.querySelectorAll('.pub-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab)
  );
  document.getElementById('photo-content').innerHTML =
    tab === 'events' ? eventsHtml : healingHtml;
}

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const [photos, photoManifest, petManifest] = await Promise.all([
      loadCSV('data/photo.csv'),
      loadJSON('data/photo_manifest.json'),
      loadJSON('data/pet_manifest.json'),
    ]);

    const folderMap = {};
    photoManifest.forEach(m => { folderMap[m.folder.slice(0, 8)] = m; });

    const entries = sortDescByDate(photos.map(p => {
      const prefix = dateToPrefix(p.date);
      const m = prefix ? folderMap[prefix] : null;
      return { ...p, folder: m ? m.folder : null, files: m ? m.files : [] };
    }));

    eventsHtml  = renderEventsTab(entries);
    healingHtml = renderHealingTab(petManifest);

    document.getElementById('photo-root').innerHTML = `
      <div class="pub-tab-bar">
        <button class="pub-tab" data-tab="events">Events</button>
        <button class="pub-tab" data-tab="healing">Healing the Day</button>
      </div>
      <div id="photo-content"></div>`;

    document.querySelectorAll('.pub-tab').forEach(btn =>
      btn.addEventListener('click', () => showTab(btn.dataset.tab))
    );
    showTab('events');
  } catch (e) {
    document.getElementById('photo-root').innerHTML =
      '<p style="color:#9ca3af;font-size:14px;padding:10px 0">Could not load photos.</p>';
    console.error(e);
  }
});
</script>
</body>
</html>
